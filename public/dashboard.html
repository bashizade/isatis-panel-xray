<!doctype html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت VLESS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Tahoma', 'Arial', 'sans-serif'] } } }
    }
  </script>
</head>

<body class="min-h-screen bg-slate-950 text-white font-sans">

  <!-- مودال ورود -->
  <div id="loginModal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-50">
    <form id="loginForm" class="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-sm space-y-4">
      <h2 class="text-xl font-bold text-cyan-400">ورود به پنل</h2>
      <input id="loginUsername" type="text" placeholder="نام کاربری" required
        class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400">
      <input id="loginPassword" type="password" placeholder="رمز عبور" required
        class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400">
      <div id="loginError" class="hidden text-red-400 text-sm"></div>
      <button type="submit" class="w-full rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-3">ورود</button>
    </form>
  </div>

  <div id="app" class="max-w-4xl mx-auto px-4 py-8 hidden">

    <header class="mb-6 flex items-center justify-between gap-4 flex-wrap">
      <div>
        <p class="text-sm text-cyan-400 mb-1">Railway Xray Panel</p>
        <h1 class="text-2xl md:text-3xl font-bold">مدیریت کاربران VLESS</h1>
      </div>
      <button id="logoutButton" class="text-xs rounded-full px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300">خروج</button>
    </header>

    <!-- خلاصه وضعیت -->
    <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>

    <!-- فرم ساخت کاربر -->
    <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-7 shadow-xl mb-6">
      <h2 class="font-bold mb-4">ساخت کاربر جدید</h2>
      <form id="userForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="md:col-span-2">
          <label class="block text-sm text-slate-300 mb-2">نام کاربر</label>
          <input id="name" required placeholder="مثلاً: ali-1"
            class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400">
        </div>
        <div>
          <label class="block text-sm text-slate-300 mb-2">محدودیت زمانی</label>
          <select id="durationKey" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400"></select>
        </div>
        <div>
          <label class="block text-sm text-slate-300 mb-2">محدودیت حجم</label>
          <select id="volumeGb" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400"></select>
        </div>
        <div>
          <label class="block text-sm text-slate-300 mb-2">تعداد اتصال هم‌زمان</label>
          <select id="connectionLimit" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none focus:border-cyan-400"></select>
        </div>
        <div class="md:col-span-2">
          <button type="submit" class="w-full rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-3">ساخت کاربر</button>
        </div>
      </form>

      <div id="message" class="hidden mt-5 rounded-xl p-4 text-sm"></div>

      <div id="result" class="hidden mt-6">
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-bold">کانفیگ ساخته‌شده</h3>
          <button id="copyButton" type="button" class="text-sm rounded-lg bg-slate-700 hover:bg-slate-600 px-3 py-2">کپی</button>
        </div>
        <textarea id="configOutput" readonly rows="4" dir="ltr"
          class="w-full rounded-xl bg-slate-950 border border-slate-700 p-4 text-xs md:text-sm font-mono text-cyan-300 outline-none"></textarea>
      </div>
    </section>

    <!-- لیست کاربران -->
    <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-7 shadow-xl">
      <h2 class="font-bold mb-4">کاربران</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm text-right">
          <thead class="text-slate-400 border-b border-slate-800">
            <tr>
              <th class="py-2 px-2">نام</th>
              <th class="py-2 px-2">انقضا</th>
              <th class="py-2 px-2">وضعیت</th>
              <th class="py-2 px-2">عملیات</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </section>

  </div>

<script>
  const el = (id) => document.getElementById(id);

  // ---------------- احراز هویت ----------------
  async function checkAuth() {
    const res = await fetch('/api/v1/stats');
    if (res.status === 401) {
      el('loginModal').classList.remove('hidden');
      el('app').classList.add('hidden');
      return false;
    }
    el('loginModal').classList.add('hidden');
    el('app').classList.remove('hidden');
    return true;
  }

  el('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: el('loginUsername').value,
        password: el('loginPassword').value
      })
    });
    const data = await res.json();
    if (!res.ok) {
      el('loginError').textContent = data.error || 'ورود ناموفق بود';
      el('loginError').classList.remove('hidden');
      return;
    }
    await bootstrap();
  });

  el('logoutButton').addEventListener('click', async () => {
    await fetch('/api/v1/auth/logout', { method: 'POST' });
    location.reload();
  });

  // ---------------- بارگذاری آمار ----------------
  async function loadStats() {
    const res = await fetch('/api/v1/stats');
    const s = await res.json();
    el('statsGrid').innerHTML = `
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-center">
        <div class="text-xs text-slate-400">کل کاربران</div>
        <div class="text-xl font-bold text-cyan-300">${s.totalUsers}</div>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-center">
        <div class="text-xs text-slate-400">فعال</div>
        <div class="text-xl font-bold text-emerald-400">${s.activeUsers}</div>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-center">
        <div class="text-xs text-slate-400">منقضی</div>
        <div class="text-xl font-bold text-red-400">${s.expiredUsers}</div>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-center">
        <div class="text-xs text-slate-400">وضعیت Xray</div>
        <div class="text-sm font-bold ${s.xrayRunning ? 'text-emerald-400' : 'text-red-400'}">
          ${s.xrayRunning ? 'در حال اجرا' : 'متوقف'}
        </div>
      </div>
    `;
  }

  // ---------------- بارگذاری گزینه‌ها ----------------
  async function loadOptions() {
    const res = await fetch('/api/v1/options');
    const opt = await res.json();

    el('durationKey').innerHTML = opt.durations
      .map(d => `<option value="${d.key}">${d.label}</option>`).join('');

    el('volumeGb').innerHTML = opt.volumes
      .map(v => `<option value="${v}">${v} گیگابایت</option>`).join('');

    el('connectionLimit').innerHTML = opt.connectionLimits
      .map(c => `<option value="${c}">${c} کاربره</option>`).join('');
  }

  // ---------------- بارگذاری لیست کاربران ----------------
  async function loadUsers() {
    const res = await fetch('/api/v1/users');
    const users = await res.json();

    el('usersTableBody').innerHTML = users.map(u => {
      const expired = new Date(u.expires_at) <= new Date();
      const statusLabel = u.disabled ? 'غیرفعال' : (expired ? 'منقضی' : 'فعال');
      const statusColor = u.disabled || expired ? 'text-red-400' : 'text-emerald-400';

      return `
        <tr class="border-b border-slate-800/60">
          <td class="py-2 px-2">${u.name}</td>
          <td class="py-2 px-2 text-xs text-slate-400">${new Date(u.expires_at).toLocaleDateString('fa-IR')}</td>
          <td class="py-2 px-2 ${statusColor} text-xs font-bold">${statusLabel}</td>
          <td class="py-2 px-2 space-x-1 space-x-reverse">
            <button data-action="config" data-id="${u.id}" class="text-xs bg-slate-700 hover:bg-slate-600 rounded-lg px-2 py-1">کانفیگ</button>
            <button data-action="toggle" data-id="${u.id}" class="text-xs bg-amber-700 hover:bg-amber-600 rounded-lg px-2 py-1">${u.disabled ? 'فعال‌سازی' : 'غیرفعال‌سازی'}</button>
            <button data-action="delete" data-id="${u.id}" class="text-xs bg-red-700 hover:bg-red-600 rounded-lg px-2 py-1">حذف</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  el('usersTableBody').addEventListener('click', async (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const { action, id } = btn.dataset;

    if (action === 'config') {
      const res = await fetch(`/api/v1/users/${id}/config`);
      const data = await res.json();
      el('configOutput').value = data.config;
      el('result').classList.remove('hidden');
      el('configOutput').scrollIntoView({ behavior: 'smooth' });
    }

    if (action === 'toggle') {
      await fetch(`/api/v1/users/${id}/toggle`, { method: 'PATCH' });
      await Promise.all([loadUsers(), loadStats()]);
    }

    if (action === 'delete') {
      if (!confirm('کاربر حذف شود؟')) return;
      await fetch(`/api/v1/users/${id}`, { method: 'DELETE' });
      await Promise.all([loadUsers(), loadStats()]);
    }
  });

  // ---------------- ساخت کاربر جدید ----------------
  el('userForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = el('message');

    const body = {
      name: el('name').value.trim(),
      durationKey: el('durationKey').value,
      volumeGb: Number(el('volumeGb').value),
      connectionLimit: Number(el('connectionLimit').value)
    };

    const res = await fetch('/api/v1/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    message.classList.remove('hidden');
    if (!res.ok || !data.success) {
      message.className = 'mt-5 rounded-xl p-4 text-sm bg-red-950 border border-red-800 text-red-300';
      message.textContent = data.error || 'ساخت کاربر ناموفق بود';
      return;
    }

    message.className = 'mt-5 rounded-xl p-4 text-sm bg-emerald-950 border border-emerald-800 text-emerald-300';
    message.textContent = 'کاربر با موفقیت ساخته و Xray ری‌استارت شد.';

    el('configOutput').value = data.config;
    el('result').classList.remove('hidden');

    el('userForm').reset();
    await Promise.all([loadUsers(), loadStats()]);
  });

  el('copyButton').addEventListener('click', async () => {
    await navigator.clipboard.writeText(el('configOutput').value);
    el('copyButton').textContent = 'کپی شد';
    setTimeout(() => el('copyButton').textContent = 'کپی', 1500);
  });

  // ---------------- شروع ----------------
  async function bootstrap() {
    const ok = await checkAuth();
    if (!ok) return;
    await Promise.all([loadOptions(), loadStats(), loadUsers()]);
  }

  bootstrap();
</script>

</body>
</html>
